<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>12 слайдов - резиновый макет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="slides-container">
    <!-- Слайд 1 -->
    <div class="slide" data-slide="0">
        <div class="slide-content">
            <img src="images/slide1.webp" alt="Иллюстрация 2" loading="lazy" class="img1 zoom-scroll"
                 data-zoom="1.2"
                 data-origin="left bottom"
                 data-shift="25%"
                 data-state="0">
            <div class="textbox">
                <div class="text">
                    У лукоморья дуб зелёный;<br>
                    Златая цепь на дубе том:
                </div>
            </div>
        </div>
    </div>

<!--     Слайд 2-->
    <div class="slide" data-slide="1">
        <div class="slide-content">
            <img src="images/slide2.webp" alt="Иллюстрация 2" loading="lazy" class="img2 scrollable"
                 data-start="bottom"
                 data-end="top">
        </div>
    </div>

    <!-- Слайд 3 -->
    <div class="slide" data-slide="2">
        <div class="slide-content">
            <img src="images/slide3.webp" alt="Иллюстрация 3" loading="lazy">
            <img src="images/slide3_1.webp" alt="Элемент" class="overlay-image" loading="lazy">
            <div class="overlay-text">
            </div>
        </div>
    </div>

    <div class="slide" data-slide="3">
        <div class="slide-content">
            <img src="images/slide4.webp" alt="Иллюстрация 4" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="4">
        <div class="slide-content">
            <img src="images/slide5.webp" alt="Иллюстрация 5" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="5">
        <div class="slide-content">
            <img src="images/slide6.webp" alt="Иллюстрация 6" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="6">
        <div class="slide-content">
            <img src="images/slide7.webp" alt="Иллюстрация 7" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="7">
        <div class="slide-content">
            <img src="images/slide8.webp" alt="Иллюстрация 8" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="8">
        <div class="slide-content">
            <img src="images/slide9.webp" alt="Иллюстрация 9" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="9">
        <div class="slide-content">
            <img src="images/slide10.webp" alt="Иллюстрация 10" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="10">
        <div class="slide-content">
            <img src="images/slide11.webp" alt="Иллюстрация 11" loading="lazy">
        </div>
    </div>

    <div class="slide" data-slide="11">
        <div class="slide-content">
            <img src="images/slide12.webp" alt="Иллюстрация 12" loading="lazy">
        </div>
    </div>

</div>
<script src="script.js"></script>

</body>
</html>
